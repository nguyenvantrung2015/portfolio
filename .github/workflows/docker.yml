name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update image tag in k8s-portfolio repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git clone https://nguyenvantrung2015:${GH_TOKEN}@github.com/nguyenvantrung2015/k8s-portfolio.git
          cd k8s-portfolio

          sed -i "s|image: samnv1996/portfolio:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/portfolio:${{ github.sha }}|" base/deployment.yaml

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add base/deployment.yaml
          git commit -m "Update portfolio image to ${{ github.sha }}"
          git push
